name: Validate official climate data migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build official normals, records, and history
        id: references
        continue-on-error: true
        run: python scripts/build_operational_reference_data.py --through-year 2025 2>&1 | tee official-reference-build.log

      - name: Upload official-reference build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-reference-build-log
          path: official-reference-build.log
          if-no-files-found: error

      - name: Stop after reference-build failure
        if: steps.references.outcome != 'success'
        run: exit 1

      - name: Rebuild completed 2025 season
        run: python scripts/update_live_data.py --year 2025 --through 2025-09-30

      - name: Refresh 2026 season and heat products
        run: python scripts/update_live_data.py --year 2026

      - name: Audit published data
        id: audit
        continue-on-error: true
        run: python scripts/audit_dashboard_data.py

      - name: Commit the audited generated dataset
        if: steps.audit.outcome == 'success'
        run: |
          if git diff --quiet -- public/data; then
            echo "Audited data already match the branch."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data
            git commit -m "data: add audited official climate dataset [skip ci]"
            git push
          fi

      - name: Upload generated data and audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audited-official-climate-data
          path: public/data
          if-no-files-found: error

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run JavaScript tests
        run: npm test

      - name: Build production site
        run: npm run build

      - name: Enforce audit result
        if: steps.audit.outcome != 'success'
        run: exit 1
