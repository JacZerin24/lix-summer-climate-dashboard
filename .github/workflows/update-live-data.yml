name: Update 2026 live climate data

on:
  schedule:
    - cron: "17 4,10,16,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-climate-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh completed daily summaries
        run: python scripts/update_live_data.py --year 2026

      - name: Commit changed data
        run: |
          if git diff --quiet -- public/data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git commit -m "data: refresh 2026 summer climate observations"
          git push
